services:

  backend:
    build: .

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

    env_file:
      - .env

    restart: always

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
      POSTGRES_DB: quiz_db

    ports:
      - "5432:5432"

  redis:
    image: redis:7

    ports:
      - "6379:6379"